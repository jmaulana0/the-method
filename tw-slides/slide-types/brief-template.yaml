# TW Slides — Brief Template
# Copy and fill in for each slide you want to create.

# --- Left-third-title (Situation / Objectives slides) ---
# Variant: 'columns' (2–4 cards in a row) or 'bullets' (numbered or not).
# See slide-types/left-third-title.md for word counts and constraints.

# Example 1: Situation with 3 columns
slide: 1
title: "Action title — a conclusion, not a topic label (15–20 words)"
layout: left-third-title
variant: columns
section_label: "Situation"
section_subtitle: "Understanding the client's\ncontext and AI ambitions"
columns:
  - title: "Column 1"       # 1–3 words
    body: "Short description of this area (12–18 words)"
    icon: ""                # Optional PNG path
  - title: "Column 2"
    body: "Short description of this area"
  - title: "Column 3"
    body: "Short description of this area"
source: "Source: Description of source (Person Name, Date)"
logo_path: ""

